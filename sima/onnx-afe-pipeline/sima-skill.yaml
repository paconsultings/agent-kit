id: onnx-afe-pipeline
name: ONNX AFE Pipeline
version: 0.1.0
agents: [codex, claude]
description: Validate and process ONNX AFE pipeline tasks.
compatibility:
  env_types: [host]
  env_subtypes: [mac, linux]
  min_cli_version: 0.0.45
runtime:
  requires:
    - python>=3.10
    - onnx
    - onnxruntime
  optional:
    - docker
